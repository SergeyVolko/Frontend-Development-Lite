<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Регистрация</title>
    </head>
    <body>
        <header>
            <a href="news.html" class="logo">
                <img src="image/logo.png" alt="Логотип First webSite">
            </a>
            <nav class="nav">
                <ul class="menu">
                    <li class="menu_item">
                        <a href="news.html">Новости</a>
                    </li>
                    <li class="menu_item">
                        <a href="music.html">Музыка</a>
                    </li>
                    <li class="menu_item">
                        <a href="registration.html">Регистрация</a>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <form class="form">
                <h2>Регистрация</h2>
                <fieldset class="fieldset">
                    <div class="form_group">
                        <label for="email">Почта</label>
                        <input type="email" id="email" placeholder="Введите почту">
                    </div>
                    <div class="form_group">
                        <label for="pass">Пароль</label>
                        <input type="password" id="pass" maxlength="10" placeholder="Придумайте пароль">
                    </div>
                    <div class="form_group">
                        <label for="tel">Телефон</label>
                        <input type="tel" id="tel" placeholder="Введите номер телефона">
                    </div>    
                </fieldset>
                <input type="submit" value="Зарегестрироваться" class="button">
                <p>Нажимая на кнопку "Зарегестрироваться", вы даете право на обработку персональных данных</p>
            </form>
        </main>
        <footer>
            <address>
                <h3>Контакты</h3>
                <address>
                    <ul class="footer_link">
                        <li class="footer_link_item">
                            <a href="mailto:first_website@mail.ru">first_website@mail.ru</a>
                        </li>
                        <li class="footer_link_item">
                            <a href="tel:79999999999">+7(999)999-99-99</a>
                        </li>
                    </ul>
                </address>
            </address>
        </footer>
    </body>
</html>
